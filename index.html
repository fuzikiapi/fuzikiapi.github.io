<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Kadu Fuziki</title>

    <meta name="description"
        content="Tech • Dev • Games • Lifestyle">

    <meta name="theme-color" content="#050816">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Background -->
    <div class="bg"></div>

    <!-- Main -->
    <main class="wrapper">

        <!-- Hero -->
        <section class="hero">

            <div class="avatar-area">

                <div class="orbit orbit-1"></div>
                <div class="orbit orbit-2"></div>
                <div class="orbit orbit-3"></div>

                <img
                    src="assets/images/avatar.png"
                    alt="Kadu Fuziki"
                    class="avatar">

            </div>

            <span class="status">

                ● Disponível para novos projetos

            </span>

            <h1>

                Kadu Fuziki

            </h1>

            <p class="subtitle">

                Building meaningful digital experiences.

            </p>

            <p class="dynamic">

                <span id="typing"></span>

            </p>

        </section>

        <!-- Social -->

        <section class="cards">

            <a href="#" class="card">

                <div>

                    <h2>Instagram</h2>

                    <p>
                        Bastidores, rotina e lifestyle.
                    </p>

                </div>

                <span>↗</span>

            </a>

            <a href="#" class="card">

                <div>

                    <h2>GitHub</h2>

                    <p>
                        Projetos, estudos e open source.
                    </p>

                </div>

                <span>↗</span>

            </a>

            <a href="#" class="card">

                <div>

                    <h2>Discord</h2>

                    <p>
                        Comunidade e networking.
                    </p>

                </div>

                <span>↗</span>

            </a>

            <a href="#" class="card">

                <div>

                    <h2>Spotify</h2>

                    <p>
                        Minha trilha sonora diária.
                    </p>

                </div>

                <span>↗</span>

            </a>

            <a href="#" class="card">

                <div>

                    <h2>Steam</h2>

                    <p>
                        Jogos e momentos de lazer.
                    </p>

                </div>

                <span>↗</span>

            </a>

        </section>

    </main>

    <script src="js/script.js"></script>

</body>

</html>
