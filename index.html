<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        name="description"
        content="KF Platform - Plataforma feita po Kadu Fuziki."
    >

    <meta
        name="theme-color"
        content="#0B0B0F"
    >

    <title>Kadu Fuziki</title>

    <!-- Fonts -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet"
    >

    <!-- CSS -->

    <link
        rel="stylesheet"
        href="css/variables.css"
    >

    <link
        rel="stylesheet"
        href="css/base.css"
    >

    <link
        rel="stylesheet"
        href="css/layout.css"
    >

    <link
        rel="stylesheet"
        href="css/components.css"
    >

    <link
        rel="stylesheet"
        href="css/responsive.css"
    >

</head>

<body>

    <!-- =====================================================
         INTRO
    ====================================================== -->

    <section
        id="intro"
        class="intro"
    >

        <div class="intro-container">

            <h1 class="intro-title">

                INICIANDO PLATAFORMA...

            </h1>

            <div class="intro-list">

                <div class="intro-item">

                    <span>

                        Carregando módulos...

                    </span>

                    <div class="progress">

                        <div class="progress-fill"></div>

                    </div>

                    <strong>

                        100%

                    </strong>

                </div>

                <div class="intro-item">

                    <span>

                        Checando GitHub API...

                    </span>

                    <div class="progress">

                        <div class="progress-fill"></div>

                    </div>

                    <strong>

                        OK

                    </strong>

                </div>

                <div class="intro-item">

                    <span>

                        Checando Discord Gateway...

                    </span>

                    <div class="progress">

                        <div class="progress-fill"></div>

                    </div>

                    <strong>

                        OK

                    </strong>

                </div>

                <div class="intro-item">

                    <span>

                        Carregando Interface...

                    </span>

                    <div class="progress">

                        <div class="progress-fill"></div>

                    </div>

                    <strong>

                        OK

                    </strong>

                </div>

                <div class="intro-item">

                    <span>

                        Carregando Recursos...

                    </span>

                    <div class="progress">

                        <div class="progress-fill"></div>

                    </div>

                    <strong>

                        OK

                    </strong>

                </div>

                <div class="intro-item">

                    <span>

                        Inicializando Componentes...

                    </span>

                    <div class="progress">

                        <div class="progress-fill"></div>

                    </div>

                    <strong>

                        OK

                    </strong>

                </div>

            </div>

            <p class="intro-message">

                Bem-vindo ao HUB.

            </p>

            <button
                id="enterButton"
                class="intro-button"
            >

                ENTRAR

            </button>

        </div>

    </section>

    <!-- =====================================================
         APPLICATION
    ====================================================== -->

    <main
        id="app"
        hidden
    >

        <div class="container">

            <header class="hero">

               <div class="hero-top">

    <div
        class="status"
        id="discordStatus"
    >

        <span class="status-dot"></span>

        Offline

    </div>

    <div class="hero-actions">

        <button
            id="themeToggle"
            class="theme-button"
            aria-label="Alternar tema"
        >

            🌙

        </button>

        <div
            class="clock"
            id="clock"
        >

            UTC−3 --:--

        </div>

    </div>

</div>

                <div class="avatar">

    <img
    id="profileAvatar"
    src=""
                        alt="Kadu Fuziki"
                    >

                </div>

               <h1 
               
                   id="profileName">
                   
                   </h1>

                <p
    class="hero-description"
    id="profileTagline"
></p>

<div class="socials">

    <a
        class="social-button"
        href="#"
        id="githubLink"
        target="_blank"
        aria-label="GitHub"
    >

        <i data-lucide="github"></i>

    </a>

    <a
        class="social-button"
        href="#"
        id="instagramLink"
        target="_blank"
        aria-label="Instagram"
    >

        <i data-lucide="instagram"></i>

    </a>

    <a
        class="social-button"
        href="#"
        id="discordLink"
        target="_blank"
        aria-label="Discord"
    >

        <i data-lucide="messages-square"></i>

    </a>

    <a
        class="social-button"
        href="#"
        id="riotLink"
        target="_blank"
        aria-label="Riot"

    >

        <i data-lucide="gamepad-2"></i>

    </a>

    <a
        class="social-button"
        href="#"
        id="youtubeLink"
        target="_blank"
        aria-label="YouTube"

    >

        <i data-lucide="youtube"></i>

    </a>

    <a
        class="social-button"
        href="#"
        id="spotifyLink"
        target="_blank"
        aria-label="Spotify"

    >

        <i data-lucide="music-4"></i>

    </a>

</div>
                
                <nav class="navigation">

                    <button
                        class="nav-button"
                        data-modal="projects"
                    >

                        Projetos

                    </button>

                    <button
                        class="nav-button"
                        data-modal="about"
                    >

                        Sobre

                    </button>

                    <button
                        class="nav-button"
                        data-modal="contact"
                    >

                        Contato

                    </button>

                </nav>

            </header>

        </div>

    </main>

    <!-- =====================================================
         MODALS
    ====================================================== -->

    <section
        id="projectsModal"
        class="modal"
    >

        <div class="modal-content">

            <button
                class="close-modal"
                aria-label="Fechar"
            >

                ×

            </button>

            <h2>

                Projetos

            </h2>

            <div id="projectsContainer"></div>

        </div>

    </section>

    <section
        id="aboutModal"
        class="modal"
    >

        <div class="modal-content">

            <button
                class="close-modal"
                aria-label="Fechar"
            >

                ×

            </button>

            <h2>

                Sobre Mim

            </h2>

            <div id="aboutContainer"></div>

        </div>

    </section>

    <section
        id="contactModal"
        class="modal"
    >

        <div class="modal-content">

            <button
                class="close-modal"
                aria-label="Fechar"
            >

                ×

            </button>

            <h2>

                Contato

            </h2>

            <div id="contactContainer"></div>

        </div>

    </section>

    <!-- =====================================================
         JAVASCRIPT
    ====================================================== -->

    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="data/config.js"></script>

    <script src="data/projects.js"></script>

    <script src="js/core.js"></script>
    
    <script src="js/intro.js"></script>
    
    <script src="js/profile.js"></script>
    
    <script src="js/projects.js"></script>
    
    <script src="js/modals.js"></script>
    
    <script src="js/clock.js"></script>
    
    <script src="js/icons.js"></script>

    <script src="js/theme.js"></script>

    <script src="js/app.js"></script>

</body>

</html>
